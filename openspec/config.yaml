# ============================================
# OpenSpec v1 - AID Service Configuration
# Generated from: AID-service 需求规格说明书 V1.0
# Date: 2026-03-04
# ============================================
openspec: v1

# --------------------------------------------
# 1. 项目信息 (Project Info)
# --------------------------------------------
project:
  name: aid-service
  version: 1.0.0
  description: |
    AID Service - 金属加工仿真系统服务端
    承接SDK端的接口调用，完成仿真任务的创建、监控、执行、结果返回等核心能力
    对接算法层实现仿真计算，支持拉弯、冲压、挤压等多种金属成型工艺
  
  tech_stack:
    backend:
      language: Python
      python_version: "3.8+"
      framework: FastAPI
      database: SQLite
    deployment:
      port: 8080
      platforms: [Linux, macOS, Windows]

# --------------------------------------------
# 2. 功能模块 (Capabilities)
# --------------------------------------------
capabilities:
  - name: authentication
    description: API Key身份认证，预留后续认证服务扩展接口
    type: auth_service
    priority: high
    
  - name: task_management
    description: 仿真任务全生命周期管理
    type: api_service
    priority: high
    apis: [newTaskCreate, newTaskverify, startTask, stopTask, deleteTask]
    
  - name: file_management
    description: 仿真参数文件上传、覆盖、存储
    type: file_service
    priority: high
    apis: [uploadParamfiles]
    
  - name: status_monitor
    description: 实时采集算法层的仿真任务执行状态
    type: monitor_service
    priority: high
    apis: [queryTaskStatus]
    
  - name: result_delivery
    description: 接收算法层的仿真结果与优化模具文件
    type: result_service
    priority: high
    apis: [fetachTaskResult]
    
  - name: data_storage
    description: 基于SQLite实现数据持久化存储
    type: data_service
    priority: medium
    
  - name: error_handling
    description: 统一管理系统错误码
    type: error_service
    priority: medium

# --------------------------------------------
# 3. 数据规范 (Data Specifications)
# --------------------------------------------
data:
  simulate_types:
    - { code: LaWan, name: 拉弯工艺 }
    - { code: CHOnYA, name: 冲压工艺 }
    - { code: ZhuZao, name: 铸造工艺 }
    - { code: ZhaZhi, name: 轧制工艺 }
    - { code: ZHEWan, name: 折弯工艺 }
    - { code: JIYA, name: 挤压工艺 }
  
  task_id_rule: "{simulateType}{8位自增数字}"
  
  required_files:
    - { name: config.yml, desc: 仿真参数文件 }
    - { name: feature_line_ref_0.stp, desc: 第一条产品参考特征线 }
    - { name: feature_line_ref_1.stp, desc: 第二条产品参考特征线 }
    - { name: left_boundary.txt, desc: 模具起始位置 }
    - { name: materials.csv, desc: 材料应力应变曲线 }
    - { name: mould_section.stp, desc: 模具截面 }
    - { name: strip_section.stp, desc: 铝件截面 }
  
  optional_files:
    - { name: product.stp, desc: 产品原始文件 }
    - { name: mesh.jnl, desc: 网格划分脚本 }
    - { name: support_side_mould_x.stp, desc: 整形板文件 }
    - { name: support_up_mould_x.stp, desc: 上模整形板文件 }
    - { name: rubber_section.stp, desc: 胶条文件 }
  
  file_formats: [stp, txt, csv, yml, jnl]
  max_file_size_mb: 100
  
  task_status:
    - { status: not_exist, desc: TaskID不存在/已被删除 }
    - { status: created, desc: 任务已创建，未启动 }
    - { status: running, desc: 任务正在执行，有附加信息 }
    - { status: failed, desc: 任务执行失败，有错误日志 }
    - { status: stop, desc: 任务已被手动停止 }
    - { status: delete, desc: 任务已被删除 }
    - { status: finished, desc: 任务执行完成 }
  
  database:
    type: SQLite
    tables:
      task_info:
        - { field: task_id, type: TEXT, pk: true }
        - { field: simulate_type, type: TEXT }
        - { field: task_name, type: TEXT }
        - { field: status, type: TEXT }
        - { field: create_time, type: TEXT }
        - { field: update_time, type: TEXT }
      file_info:
        - { field: file_id, type: INTEGER, pk: true }
        - { field: task_id, type: TEXT }
        - { field: file_name, type: TEXT }
        - { field: file_path, type: TEXT }
        - { field: file_size, type: INTEGER }
        - { field: upload_time, type: TEXT }
        - { field: file_type, type: TEXT }
      error_log:
        - { field: log_id, type: INTEGER, pk: true }
        - { field: task_id, type: TEXT }
        - { field: error_code, type: INTEGER }
        - { field: error_message, type: TEXT }
        - { field: error_time, type: TEXT }
        - { field: interface_name, type: TEXT }

# --------------------------------------------
# 4. 接口定义 (Interfaces)
# --------------------------------------------
interfaces:
  rest_api:
    base_url: /api/v1
    auth: { type: api_key, key: "11111111" }
    
    endpoints:
      - path: /newTaskCreate
        method: POST
        desc: 创建仿真任务
        request: { simulateType: string, taskName: string, api_key: string }
        response: { code: int, message: string, taskID: string }
        
      - path: /uploadParamfiles
        method: POST
        desc: 上传参数文件
        request: { TaskID: string, files: file_array }
        response: { code: int, message: string, taskID: string, uploadFiles: array, failFiles: array }
        
      - path: /newTaskverify
        method: POST
        desc: 校验参数文件完整性
        request: { TaskID: string }
        response: { code: int, message: string, taskID: string, ready: bool, missingFiles: array }
        
      - path: /startTask
        method: POST
        desc: 启动仿真任务
        request: { TaskID: string }
        response: { code: int, message: string, taskID: string, status: string }
        
      - path: /queryTaskStatus
        method: POST
        desc: 查询任务状态
        request: { TaskID: string }
        response: { code: int, message: string, taskID: string, status: string, extra: json }
        
      - path: /stopTask
        method: POST
        desc: 停止仿真任务
        request: { TaskID: string }
        response: { code: int, message: string, taskID: string, status: string }
        
      - path: /deleteTask
        method: POST
        desc: 删除仿真任务
        request: { TaskID: string }
        response: { code: int, message: string, taskID: string }
        
      - path: /fetachTaskResult
        method: POST
        desc: 获取优化模具文件
        request: { TaskID: string }
        response: { code: int, message: string, taskID: string, file: file_stream }
        
      - path: /health
        method: GET
        desc: 服务端健康检查
        response: { status: string, version: string, python: string, sqlite: string }

# --------------------------------------------
# 5. 错误码体系 (Error Codes)
# --------------------------------------------
error_codes:
  success:
    - { code: 200, message: 操作成功, scope: all }
  
  business:
    - { code: 301, message: 任务创建失败, scope: newTaskCreate }
    - { code: 302, message: 工作文件缺失, scope: newTaskverify }
    - { code: 303, message: 上传文件失败, scope: uploadParamfiles }
    - { code: 401, message: 任务开始失败/未授权, scope: [startTask, auth] }
    - { code: 402, message: 任务停止失败, scope: stopTask }
    - { code: 403, message: 任务删除失败, scope: deleteTask }
    - { code: 404, message: 获取结果失败, scope: [queryTaskStatus, fetachTaskResult] }
  
  system:
    - { code: 500, message: 算法内部运行错误, scope: all }

# --------------------------------------------
# 6. 质量标准 (Quality Standards)
# --------------------------------------------
quality:
  performance:
    response_time:
      light_api_ms: 100          # newTaskCreate/queryTaskStatus/newTaskverify
      file_api_single_ms: 500    # uploadParamfiles单文件
      file_api_multi_ms: 2000    # uploadParamfiles多文件
      task_api_ms: 300           # startTask/stopTask/deleteTask/fetachTaskResult
      algorithm_api_ms: 500      # 算法层交互
    concurrency:
      per_sdk: 5
      total_sdk: 10
      total_tasks: 50
    throughput:
      file_upload_mbps: 10
      api_calls_per_sec: 100
  
  compatibility:
    python: ["3.8", "3.9", "3.10", "3.11"]
    platforms:
      linux: [CentOS 7/8, Ubuntu 18.04/20.04]
      macos: ["10.15+"]
      windows: [Server 2016/2019/2022, "10/11"]
  
  security:
    auth:
      type: api_key
      value: "11111111"
      extensible: true
    data:
      encryption: reserved
      file_permission: process_only
      db_permission: process_only
    operation:
      input_validation: strict
      sql_injection: parameterized
      file_validation: strict
  
  observability:
    logs:
      types: [access, business, error, system]
      format: UTF-8
      rotation: daily
      retention_days: 30
    monitoring:
      health_check: /api/v1/health
      resource_alert:
        cpu_percent: 90
        memory_percent: 90
        disk_percent: 95
  
  reliability:
    availability: 99.9%
    data_atomicity: true
    backup:
      db_interval_hours: 1
      db_retention_hours: 24
    recovery:
      auto_restart: true
      db_reconnect_times: 3
      db_reconnect_interval_sec: 5

# --------------------------------------------
# 7. 开发工作流 (Workflow)
# --------------------------------------------
workflow:
  phases:
    - { name: specification, artifacts: [specs, tasks] }
    - { name: implementation, artifacts: [code, tests] }
    - { name: testing, artifacts: [test_reports] }
    - { name: deployment, artifacts: [deploy_package] }
  
  deliverables:
    source_code:
      - Python源码（PEP8规范，注释≥80%）
      - 配置文件（api_key、路径等）
      - requirements.txt
      - SQLite初始化脚本
      - 部署脚本（Shell/批处理）
    documentation:
      - 需求规格说明书
      - 接口文档（Swagger/OpenAPI 3.0）
      - 开发手册
      - 部署手册
      - 测试手册
    testing:
      - 单元测试（pytest，覆盖率≥90%）
      - 集成测试
      - 性能测试
      - 自动化测试脚本
      - 测试报告
    deployment:
      - 离线部署包
      - 日志模板
      - 健康检查工具
      - 数据备份脚本

# --------------------------------------------
# 8. 多智能体配置 (Multi-Agent Config)
# --------------------------------------------
agents:
  roles:
    - name: backend_developer
      desc: Python后端开发工程师
      capabilities: [task_management, file_management, status_monitor, result_delivery]
      language: Python
      
    - name: database_developer
      desc: 数据库开发工程师
      capabilities: [data_storage]
      tools: [SQLite]
      
    - name: qa_engineer
      desc: 质量保证工程师
      capabilities: [testing]
      test_types: [unit, integration, performance]
      
    - name: devops_engineer
      desc: 运维工程师
      capabilities: [deployment, monitoring]

# --------------------------------------------
# 9. 验收标准 (Acceptance Criteria)
# --------------------------------------------
acceptance:
  functional:
    - 所有核心接口实现文档定义的功能
    - 仿真任务全流程正常执行
    - 认证模块实现API Key鉴权
    - 数据存储模块基于SQLite实现持久化
    - 错误处理模块实现全局错误码体系
  
  non_functional:
    - 性能指标达到quality.performance要求
    - 兼容性覆盖所有指定平台和版本
    - 安全性符合quality.security要求
    - 可观测性符合quality.observability要求
    - 可靠性符合quality.reliability要求
  
  deliverables:
    - 所有交付物完整提供
    - 代码注释覆盖率≥80%
    - 测试覆盖率≥90%
    - 文档符合Qoder解析要求
